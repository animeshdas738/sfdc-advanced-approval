<template>
    <!-- Loading -->
    <template lwc:if={loading}>
        <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
    </template>

    <!-- Approve / Reject buttons — visible whenever a request is pending -->
    <template lwc:elseif={requestExists}>
        <template lwc:if={isAssignee}>
            <p class="slds-text-body_small slds-m-bottom_small">
                <span class="slds-text-color_weak">Assigned Approver: </span>
                <strong>{assigneeName}</strong>
            </p>
        </template>
        <div class="slds-button-group">
            <lightning-button
                label="Approve"
                variant="brand"
                onclick={handleApprove}
                disabled={working}>
            </lightning-button>
            <lightning-button
                label="Reject"
                variant="destructive"
                onclick={handleReject}
                disabled={working}>
            </lightning-button>
        </div>
    </template>

    <!-- No pending request -->
    <template lwc:else>
        <p class="slds-text-color_weak slds-text-body_small">
            No active approval request found for this record.
        </p>
    </template>
</template>
